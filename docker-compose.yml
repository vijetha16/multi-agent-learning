services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lumio
      POSTGRES_USER: lumio
      POSTGRES_PASSWORD: lumio_local_only
    ports: ["5432:5432"]
    volumes: [lumio_data:/var/lib/postgresql/data]
  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://lumio:lumio_local_only@database:5432/lumio
      JWT_SECRET: change-this-before-production
      FRONTEND_URL: http://localhost:3000
    ports: ["4000:4000"]
    depends_on: [database]
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports: ["3000:3000"]
    depends_on: [backend]
volumes:
  lumio_data:
